<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Verdana, 'Helvetica Neue', Arial, sans-serif">
  <rect width="1000" height="600" fill="#F0EEE6"/>

  <!-- Title -->
  <rect x="60" y="36" width="34" height="6" rx="3" fill="#D97757"/>
  <text x="60" y="78" font-size="30" font-weight="bold" fill="#29261F">Daniel's AI Build Kit &amp; Remote-Mentor Loop</text>
  <text x="62" y="104" font-size="15" fill="#6B6258">A young builder leads an AI team — builds, shows, sells (with an adult present), and gives.</text>

  <!-- Toolbelt strip -->
  <text x="60" y="142" font-size="12" fill="#8A8178" font-weight="bold">YOUR TOOLBELT</text>
  <g font-size="12" fill="#5F574C">
    <rect x="60" y="152" width="92" height="28" rx="14" fill="#FFFFFF" stroke="#EAD0C1" stroke-width="2"/><text x="106" y="170" text-anchor="middle">🧑‍💻 Codex</text>
    <rect x="160" y="152" width="98" height="28" rx="14" fill="#FFFFFF" stroke="#EAD0C1" stroke-width="2"/><text x="209" y="170" text-anchor="middle">⚙️ Hermes</text>
    <rect x="266" y="152" width="104" height="28" rx="14" fill="#FFFFFF" stroke="#EAD0C1" stroke-width="2"/><text x="318" y="170" text-anchor="middle">🎯 goal-10x</text>
    <rect x="378" y="152" width="104" height="28" rx="14" fill="#FFFFFF" stroke="#EAD0C1" stroke-width="2"/><text x="430" y="170" text-anchor="middle">🤖 anyagent</text>
    <rect x="490" y="152" width="98" height="28" rx="14" fill="#FFFFFF" stroke="#EAD0C1" stroke-width="2"/><text x="539" y="170" text-anchor="middle">🧠 super-u</text>
    <rect x="596" y="152" width="140" height="28" rx="14" fill="#FFFFFF" stroke="#EAD0C1" stroke-width="2"/><text x="666" y="170" text-anchor="middle">🌐 dreammaketrue</text>
    <rect x="744" y="152" width="96" height="28" rx="14" fill="#FFFFFF" stroke="#EAD0C1" stroke-width="2"/><text x="792" y="170" text-anchor="middle">🆓 free-llm</text>
  </g>

  <!-- The loop: 5 nodes -->
  <g fill="#D97757">
    <polygon points="0,-6 0,6 12,0" transform="translate(212,330)"/>
    <polygon points="0,-6 0,6 12,0" transform="translate(400,330)"/>
    <polygon points="0,-6 0,6 12,0" transform="translate(588,330)"/>
    <polygon points="0,-6 0,6 12,0" transform="translate(776,330)"/>
  </g>

  <!-- Node 1: Build -->
  <rect x="40" y="218" width="168" height="224" rx="16" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="124" y="256" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">1</text>
  <text x="124" y="294" font-size="30" text-anchor="middle">🛠️</text>
  <text x="124" y="326" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">BUILD</text>
  <text x="124" y="352" font-size="12" fill="#5F574C" text-anchor="middle">Your idea first,</text>
  <text x="124" y="370" font-size="12" fill="#5F574C" text-anchor="middle">then the AI team.</text>
  <text x="124" y="402" font-size="11" fill="#15803D" text-anchor="middle">verify the AI ✓</text>

  <!-- Node 2: Show -->
  <rect x="228" y="218" width="168" height="224" rx="16" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="312" y="256" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">2</text>
  <text x="312" y="294" font-size="30" text-anchor="middle">📲</text>
  <text x="312" y="326" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">SHOW</text>
  <text x="312" y="352" font-size="12" fill="#5F574C" text-anchor="middle">A 60-sec demo</text>
  <text x="312" y="370" font-size="12" fill="#5F574C" text-anchor="middle">to Dad (async).</text>

  <!-- Node 3: Feedback -->
  <rect x="416" y="218" width="168" height="224" rx="16" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="500" y="256" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">3</text>
  <text x="500" y="294" font-size="30" text-anchor="middle">💬</text>
  <text x="500" y="326" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">FEEDBACK</text>
  <text x="500" y="352" font-size="12" fill="#5F574C" text-anchor="middle">Dad coaches —</text>
  <text x="500" y="370" font-size="12" fill="#5F574C" text-anchor="middle">near or 1,000 mi.</text>

  <!-- Node 4: Sell -->
  <rect x="604" y="218" width="168" height="224" rx="16" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="688" y="256" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">4</text>
  <text x="688" y="294" font-size="30" text-anchor="middle">🪧</text>
  <text x="688" y="326" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">SELL</text>
  <text x="688" y="352" font-size="12" fill="#5F574C" text-anchor="middle">Plan it now —</text>
  <text x="688" y="370" font-size="12" fill="#5F574C" text-anchor="middle">sell when together.</text>
  <text x="688" y="402" font-size="11" fill="#B91C1C" text-anchor="middle" font-weight="bold">adult present 🧑‍🤝‍🧑</text>

  <!-- Node 5: Give -->
  <rect x="792" y="218" width="168" height="224" rx="16" fill="#FFFFFF" stroke="#29261F" stroke-width="3"/>
  <text x="876" y="256" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">5</text>
  <text x="876" y="294" font-size="30" text-anchor="middle">🎁</text>
  <text x="876" y="326" font-size="16" font-weight="bold" fill="#29261F" text-anchor="middle">GIVE</text>
  <text x="876" y="352" font-size="12" fill="#5F574C" text-anchor="middle">Decide first how</text>
  <text x="876" y="370" font-size="12" fill="#5F574C" text-anchor="middle">much to give.</text>
  <text x="876" y="402" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">↺ then loop again</text>

  <!-- Footer banner: the two rules -->
  <rect x="40" y="470" width="920" height="56" rx="12" fill="#FAF4EE" stroke="#EAD0C1" stroke-width="2"/>
  <text x="500" y="494" font-size="13.5" fill="#29261F" text-anchor="middle" font-weight="bold">Two rules that never change:</text>
  <text x="500" y="514" font-size="12.5" fill="#6B6258" text-anchor="middle">① You stay the mind &amp; conscience — your attempt first, then verify the AI.   ② Real world or public → a trusted adult is physically with you.</text>
</svg>
