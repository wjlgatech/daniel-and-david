<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Verdana, 'Helvetica Neue', Arial, sans-serif">
  <rect width="1000" height="640" fill="#F0EEE6"/>

  <!-- Title -->
  <rect x="60" y="40" width="34" height="6" rx="3" fill="#D97757"/>
  <text x="60" y="84" font-size="32" font-weight="bold" fill="#29261F">Isaiah 35 — The Restoration Track</text>
  <text x="62" y="112" font-size="16" fill="#6B6258">For adults rebuilding their trajectory. “Be strong; fear not!” — Isaiah 35:4</text>

  <!-- Journey strip: desert -> highway -> home -->
  <g>
    <text x="100" y="166" font-size="22" text-anchor="middle">🏜️</text>
    <text x="100" y="188" font-size="12" fill="#6B6258" text-anchor="middle">the dry land</text>
    <line x1="150" y1="160" x2="430" y2="160" stroke="#EAD0C1" stroke-width="4" stroke-dasharray="2 8" stroke-linecap="round"/>
    <text x="500" y="156" font-size="13" fill="#D97757" text-anchor="middle" font-weight="bold">the Way of Holiness (Isaiah 35:8)</text>
    <line x1="570" y1="160" x2="850" y2="160" stroke="#EAD0C1" stroke-width="4" stroke-dasharray="2 8" stroke-linecap="round"/>
    <text x="900" y="166" font-size="22" text-anchor="middle">🎶</text>
    <text x="900" y="188" font-size="12" fill="#6B6258" text-anchor="middle">home, with joy</text>
  </g>

  <!-- ===== CARD 1: RESTORATION ===== -->
  <rect x="60" y="214" width="210" height="276" rx="18" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="165" y="262" font-size="34" text-anchor="middle">🌱</text>
  <text x="165" y="300" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">RESTORATION</text>
  <text x="165" y="324" font-size="12" fill="#B91C1C" text-anchor="middle">for the hopeless</text>
  <text x="165" y="356" font-size="13" fill="#5F574C" text-anchor="middle">The desert blooms.</text>
  <text x="165" y="374" font-size="13" fill="#5F574C" text-anchor="middle">Ship one small real</text>
  <text x="165" y="392" font-size="13" fill="#5F574C" text-anchor="middle">thing this week.</text>
  <text x="165" y="446" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">Isaiah 35:1 ·</text>
  <text x="165" y="462" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">“streams in the desert”</text>

  <!-- ===== CARD 2: REDEMPTION ===== -->
  <rect x="300" y="214" width="210" height="276" rx="18" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="405" y="262" font-size="34" text-anchor="middle">🔁</text>
  <text x="405" y="300" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">REDEMPTION</text>
  <text x="405" y="324" font-size="12" fill="#B91C1C" text-anchor="middle">for the meaningless</text>
  <text x="405" y="356" font-size="13" fill="#5F574C" text-anchor="middle">Nothing is wasted.</text>
  <text x="405" y="374" font-size="13" fill="#5F574C" text-anchor="middle">Your story becomes</text>
  <text x="405" y="392" font-size="13" fill="#5F574C" text-anchor="middle">your service.</text>
  <text x="405" y="446" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">Isaiah 35:10 ·</text>
  <text x="405" y="462" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">“the ransomed return”</text>

  <!-- ===== CARD 3: REGENERATION ===== -->
  <rect x="540" y="214" width="210" height="276" rx="18" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="645" y="262" font-size="34" text-anchor="middle">🧠</text>
  <text x="645" y="300" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">REGENERATION</text>
  <text x="645" y="324" font-size="12" fill="#B91C1C" text-anchor="middle">for the helpless</text>
  <text x="645" y="356" font-size="13" fill="#5F574C" text-anchor="middle">New heart, new skills.</text>
  <text x="645" y="374" font-size="13" fill="#5F574C" text-anchor="middle">Direct an AI team —</text>
  <text x="645" y="392" font-size="13" fill="#5F574C" text-anchor="middle">you’re not stuck.</text>
  <text x="645" y="446" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">Isaiah 35:5 ·</text>
  <text x="645" y="462" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">“eyes opened”</text>

  <!-- ===== CARD 4: RESURRECTION ===== -->
  <rect x="780" y="214" width="210" height="276" rx="18" fill="#FFFFFF" stroke="#29261F" stroke-width="3"/>
  <text x="885" y="262" font-size="34" text-anchor="middle">✝️</text>
  <text x="885" y="300" font-size="16" font-weight="bold" fill="#29261F" text-anchor="middle">RESURRECTION</text>
  <text x="885" y="324" font-size="12" fill="#B91C1C" text-anchor="middle">for the peaceless</text>
  <text x="885" y="356" font-size="13" fill="#5F574C" text-anchor="middle">New life with Christ.</text>
  <text x="885" y="374" font-size="13" fill="#5F574C" text-anchor="middle">A dead trajectory</text>
  <text x="885" y="392" font-size="13" fill="#5F574C" text-anchor="middle">raised, not patched.</text>
  <text x="885" y="446" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">Romans 6:5 ·</text>
  <text x="885" y="462" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">“a resurrection like his”</text>

  <!-- Identity shift bar -->
  <rect x="60" y="516" width="880" height="50" rx="12" fill="#FAF4EE" stroke="#EAD0C1" stroke-width="2"/>
  <text x="500" y="540" font-size="15" fill="#29261F" text-anchor="middle" font-weight="bold">From orphan → to beloved son &amp; daughter</text>
  <text x="500" y="558" font-size="12" fill="#6B6258" text-anchor="middle">low self-image · unsure of calling · braced for rejection  →  chosen, named, sent  ·  “I will not leave you as orphans” (John 14:18)</text>

  <!-- Footer: the engine -->
  <text x="500" y="600" font-size="13" fill="#8A8178" text-anchor="middle" font-style="italic">The engine: a Builder Loop for your life — small loops, compounding, with an AI team. Fast · frequent · failing-forward.</text>
</svg>
