<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Verdana, 'Helvetica Neue', Arial, sans-serif">
  <rect width="1000" height="600" fill="#F0EEE6"/>

  <!-- Title -->
  <rect x="60" y="40" width="34" height="6" rx="3" fill="#D97757"/>
  <text x="60" y="84" font-size="32" font-weight="bold" fill="#29261F">The Restoration Loop — 4 weeks</text>
  <text x="62" y="112" font-size="16" fill="#6B6258">An adult's run on the Builder Loop engine. One real thing each week. “Be strong; fear not.”</text>

  <!-- progress arrows -->
  <g fill="#D97757">
    <polygon points="0,-7 0,7 13,0" transform="translate(282,300)"/>
    <polygon points="0,-7 0,7 13,0" transform="translate(522,300)"/>
    <polygon points="0,-7 0,7 13,0" transform="translate(762,300)"/>
  </g>

  <!-- WEEK 1 -->
  <rect x="60" y="158" width="210" height="300" rx="18" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="165" y="190" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">WEEK 1</text>
  <text x="165" y="232" font-size="34" text-anchor="middle">🌱</text>
  <text x="165" y="268" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">RESTORATION</text>
  <text x="165" y="292" font-size="12" fill="#B91C1C" text-anchor="middle">heals: hopeless</text>
  <text x="165" y="324" font-size="12.5" fill="#5F574C" text-anchor="middle">The desert blooms —</text>
  <text x="165" y="342" font-size="12.5" fill="#5F574C" text-anchor="middle">ship one small real</text>
  <text x="165" y="360" font-size="12.5" fill="#5F574C" text-anchor="middle">thing this week.</text>
  <text x="165" y="408" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">✅ a shipped thing +</text>
  <text x="165" y="424" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">one person's reaction</text>

  <!-- WEEK 2 -->
  <rect x="300" y="158" width="210" height="300" rx="18" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="405" y="190" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">WEEK 2</text>
  <text x="405" y="232" font-size="34" text-anchor="middle">🔁</text>
  <text x="405" y="268" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">REDEMPTION</text>
  <text x="405" y="292" font-size="12" fill="#B91C1C" text-anchor="middle">heals: meaningless</text>
  <text x="405" y="324" font-size="12.5" fill="#5F574C" text-anchor="middle">Nothing wasted —</text>
  <text x="405" y="342" font-size="12.5" fill="#5F574C" text-anchor="middle">your story becomes</text>
  <text x="405" y="360" font-size="12.5" fill="#5F574C" text-anchor="middle">your service.</text>
  <text x="405" y="408" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">✅ a help from your</text>
  <text x="405" y="424" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">story, for one person</text>

  <!-- WEEK 3 -->
  <rect x="540" y="158" width="210" height="300" rx="18" fill="#FFFFFF" stroke="#D97757" stroke-width="3"/>
  <text x="645" y="190" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">WEEK 3</text>
  <text x="645" y="232" font-size="34" text-anchor="middle">🧠</text>
  <text x="645" y="268" font-size="16" font-weight="bold" fill="#D97757" text-anchor="middle">REGENERATION</text>
  <text x="645" y="292" font-size="12" fill="#B91C1C" text-anchor="middle">heals: helpless</text>
  <text x="645" y="324" font-size="12.5" fill="#5F574C" text-anchor="middle">New heart + skills —</text>
  <text x="645" y="342" font-size="12.5" fill="#5F574C" text-anchor="middle">direct an AI team;</text>
  <text x="645" y="360" font-size="12.5" fill="#5F574C" text-anchor="middle">you're not stuck.</text>
  <text x="645" y="408" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">✅ built with AI —</text>
  <text x="645" y="424" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">and you can explain it</text>

  <!-- WEEK 4 -->
  <rect x="780" y="158" width="210" height="300" rx="18" fill="#FFFFFF" stroke="#29261F" stroke-width="3"/>
  <text x="885" y="190" font-size="12" fill="#8A8178" text-anchor="middle" font-weight="bold">WEEK 4</text>
  <text x="885" y="232" font-size="34" text-anchor="middle">✝️</text>
  <text x="885" y="268" font-size="16" font-weight="bold" fill="#29261F" text-anchor="middle">RESURRECTION</text>
  <text x="885" y="292" font-size="12" fill="#B91C1C" text-anchor="middle">heals: peaceless</text>
  <text x="885" y="324" font-size="12.5" fill="#5F574C" text-anchor="middle">New life with Christ —</text>
  <text x="885" y="342" font-size="12.5" fill="#5F574C" text-anchor="middle">a trajectory raised,</text>
  <text x="885" y="360" font-size="12.5" fill="#5F574C" text-anchor="middle">not patched.</text>
  <text x="885" y="408" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">✅ a named calling +</text>
  <text x="885" y="424" font-size="11.5" fill="#15803D" text-anchor="middle" font-weight="bold">a committed next loop</text>

  <!-- Footer -->
  <rect x="60" y="492" width="880" height="44" rx="12" fill="#FAF4EE" stroke="#EAD0C1" stroke-width="2"/>
  <text x="500" y="513" font-size="14" fill="#29261F" text-anchor="middle" font-weight="bold">The 12x is the loop, repeated — capability, income &amp; identity rising together.</text>
  <text x="500" y="530" font-size="12" fill="#6B6258" text-anchor="middle">fast · frequent · failing-forward  ·  you stay the mind; the AI does the heavy lifting</text>
  <text x="500" y="566" font-size="11" fill="#8A8178" text-anchor="middle" font-style="italic">In real crisis? Reach a professional or someone you trust first (US: 988 · findahelpline.com). This is for rebuilding, not a substitute for care.</text>
</svg>
