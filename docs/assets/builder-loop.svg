<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Verdana, 'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="480" fill="#F0EEE6"/>

  <!-- Title -->
  <rect x="60" y="40" width="34" height="6" rx="3" fill="#D97757"/>
  <text x="60" y="84" font-size="34" font-weight="bold" fill="#29261F">How You Become a Builder</text>
  <text x="62" y="114" font-size="18" fill="#6B6258">Learn it, build it for real, let the work teach you back — then do it again, stronger.</text>

  <!-- Arrows between boxes -->
  <line x1="392" y1="262" x2="446" y2="262" stroke="#D97757" stroke-width="5" stroke-linecap="round"/>
  <path d="M446,262 L434,255 L434,269 Z" fill="#D97757"/>
  <line x1="752" y1="262" x2="806" y2="262" stroke="#D97757" stroke-width="5" stroke-linecap="round"/>
  <path d="M806,262 L794,255 L794,269 Z" fill="#D97757"/>

  <!-- Repeat arrow (C -> A) -->
  <path d="M960,340 C960,430 240,430 240,344" fill="none" stroke="#C9A98E" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 12"/>
  <path d="M240,344 L233,358 L247,358 Z" fill="#C9A98E"/>
  <text x="600" y="438" font-size="16" font-style="italic" fill="#8A8175" text-anchor="middle">...and again, a little stronger each time</text>

  <!-- ===== BOX A: LEARN ===== -->
  <rect x="90" y="188" width="300" height="152" rx="20" fill="#FAF9F5" stroke="#D97757" stroke-width="2.5"/>
  <g transform="translate(240,228)">
    <rect x="-20" y="-12" width="18" height="24" rx="2" fill="#7DA060"/>
    <rect x="2" y="-12" width="18" height="24" rx="2" fill="#8FB36B"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#FAF9F5" stroke-width="2"/>
  </g>
  <text x="240" y="288" font-size="24" font-weight="bold" fill="#D97757" text-anchor="middle">1. LEARN</text>
  <text x="240" y="314" font-size="14" fill="#5F574C" text-anchor="middle">a principle — how the best</text>
  <text x="240" y="332" font-size="14" fill="#5F574C" text-anchor="middle">AI-native builders work</text>

  <!-- ===== BOX B: BUILD ===== -->
  <rect x="450" y="188" width="300" height="152" rx="20" fill="#FAF9F5" stroke="#D97757" stroke-width="2.5"/>
  <g transform="translate(600,228)">
    <path d="M0,-16 C9,-6 9,8 0,16 C-9,8 -9,-6 0,-16 Z" fill="#D97757"/>
    <circle cx="0" cy="-3" r="4" fill="#FAF9F5"/>
    <path d="M-9,6 L-15,16 L-4,12 Z" fill="#C2613F"/>
    <path d="M9,6 L15,16 L4,12 Z" fill="#C2613F"/>
  </g>
  <text x="600" y="288" font-size="24" font-weight="bold" fill="#D97757" text-anchor="middle">2. BUILD</text>
  <text x="600" y="314" font-size="14" fill="#5F574C" text-anchor="middle">it on a real venture</text>
  <text x="600" y="332" font-size="14" fill="#5F574C" text-anchor="middle">that people can pay for</text>

  <!-- ===== BOX C: LEARN BACK ===== -->
  <rect x="810" y="188" width="300" height="152" rx="20" fill="#FAF9F5" stroke="#D97757" stroke-width="2.5"/>
  <g transform="translate(960,226)">
    <circle cx="0" cy="-2" r="13" fill="#E8B84B"/>
    <rect x="-6" y="9" width="12" height="7" rx="2" fill="#9A9081"/>
    <line x1="0" y1="-22" x2="0" y2="-18" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="-12" x2="-12" y2="-9" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="-12" x2="12" y2="-9" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="960" y="288" font-size="24" font-weight="bold" fill="#D97757" text-anchor="middle">3. LEARN BACK</text>
  <text x="960" y="314" font-size="14" fill="#5F574C" text-anchor="middle">the venture shows you</text>
  <text x="960" y="332" font-size="14" fill="#5F574C" text-anchor="middle">what really works</text>
</svg>
