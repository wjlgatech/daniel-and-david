<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1186" font-family="Verdana, 'Helvetica Neue', Arial, sans-serif">
<rect width="1200" height="1186" fill="#F0EEE6"/>
<rect x="48" y="44" width="34" height="6" rx="3" fill="#D97757"/>
<text x="48" y="92" font-size="40" font-weight="bold" fill="#29261F">Critical Thinking is Key</text>
<text x="50" y="122" font-size="17" fill="#6B6258">Six question-words that turn any topic into deeper understanding. Point them at anything — a claim, a plan, a venture, a verse.</text>
<rect x="48" y="160" width="150" height="150" rx="18" fill="#9B6A8F"/>
<text x="123" y="244" font-size="27" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Who</text>
<rect x="212" y="160" width="940" height="150" rx="18" fill="#F3EAF1" stroke="#E6E0D2" stroke-width="1.5"/>
<text x="236" y="198" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> benefits from this?</text>
<text x="236" y="229" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> is this harmful to?</text>
<text x="236" y="260" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> makes decisions about this?</text>
<text x="236" y="291" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> is most directly affected?</text>
<text x="694" y="198" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> have you also heard discuss this?</text>
<text x="694" y="229" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> would be the best person to consult?</text>
<text x="694" y="260" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> will be the key people in this?</text>
<text x="694" y="291" font-size="14.5" fill="#3F3A32"><tspan fill="#9B6A8F" font-weight="bold">…</tspan> deserves recognition for this?</text>
<rect x="48" y="326" width="150" height="150" rx="18" fill="#6B89A8"/>
<text x="123" y="410" font-size="27" font-weight="bold" fill="#FFFFFF" text-anchor="middle">What</text>
<rect x="212" y="326" width="940" height="150" rx="18" fill="#E9EFF4" stroke="#E6E0D2" stroke-width="1.5"/>
<text x="236" y="364" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> are the strengths / weaknesses?</text>
<text x="236" y="395" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> is another perspective?</text>
<text x="236" y="426" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> is another alternative?</text>
<text x="236" y="457" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> would be a counter-argument?</text>
<text x="694" y="364" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> is the best / worst case scenario?</text>
<text x="694" y="395" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> is most / least important?</text>
<text x="694" y="426" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> can we do to make a positive change?</text>
<text x="694" y="457" font-size="14.5" fill="#3F3A32"><tspan fill="#6B89A8" font-weight="bold">…</tspan> is getting in the way of our action?</text>
<rect x="48" y="492" width="150" height="150" rx="18" fill="#6E9457"/>
<text x="123" y="576" font-size="27" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Where</text>
<rect x="212" y="492" width="940" height="150" rx="18" fill="#EAF1E5" stroke="#E6E0D2" stroke-width="1.5"/>
<text x="236" y="530" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> would we see this in the real world?</text>
<text x="236" y="561" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> are there similar concepts / situations?</text>
<text x="236" y="592" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> is there the most need for this?</text>
<text x="236" y="623" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> in the world would this be a problem?</text>
<text x="694" y="530" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> can we get more information?</text>
<text x="694" y="561" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> do we go for help with this?</text>
<text x="694" y="592" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> will this idea take us?</text>
<text x="694" y="623" font-size="14.5" fill="#3F3A32"><tspan fill="#6E9457" font-weight="bold">…</tspan> are the areas for improvement?</text>
<rect x="48" y="658" width="150" height="150" rx="18" fill="#C28A2E"/>
<text x="123" y="742" font-size="27" font-weight="bold" fill="#FFFFFF" text-anchor="middle">When</text>
<rect x="212" y="658" width="940" height="150" rx="18" fill="#F6EEDD" stroke="#E6E0D2" stroke-width="1.5"/>
<text x="236" y="696" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> is this acceptable / unacceptable?</text>
<text x="236" y="727" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> would this benefit our society?</text>
<text x="236" y="758" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> would this cause a problem?</text>
<text x="236" y="789" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> is the best time to take action?</text>
<text x="694" y="696" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> will we know we&#x27;ve succeeded?</text>
<text x="694" y="727" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> has this played a part in our history?</text>
<text x="694" y="758" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> can we expect this to change?</text>
<text x="694" y="789" font-size="14.5" fill="#3F3A32"><tspan fill="#C28A2E" font-weight="bold">…</tspan> should we ask for help with this?</text>
<rect x="48" y="824" width="150" height="150" rx="18" fill="#C2613F"/>
<text x="123" y="908" font-size="27" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Why</text>
<rect x="212" y="824" width="940" height="150" rx="18" fill="#F5E6DF" stroke="#E6E0D2" stroke-width="1.5"/>
<text x="236" y="862" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> is this a problem / challenge?</text>
<text x="236" y="893" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> is it relevant to me / others?</text>
<text x="236" y="924" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> is this the best / worst scenario?</text>
<text x="236" y="955" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> are people influenced by this?</text>
<text x="694" y="862" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> should people know about this?</text>
<text x="694" y="893" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> has it been this way for so long?</text>
<text x="694" y="924" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> have we allowed this to happen?</text>
<text x="694" y="955" font-size="14.5" fill="#3F3A32"><tspan fill="#C2613F" font-weight="bold">…</tspan> is there a need for this today?</text>
<rect x="48" y="990" width="150" height="150" rx="18" fill="#D97757"/>
<text x="123" y="1074" font-size="27" font-weight="bold" fill="#FFFFFF" text-anchor="middle">How</text>
<rect x="212" y="990" width="940" height="150" rx="18" fill="#F8E8E1" stroke="#E6E0D2" stroke-width="1.5"/>
<text x="236" y="1028" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> is this similar to ____?</text>
<text x="236" y="1059" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> does this disrupt things?</text>
<text x="236" y="1090" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> do we know the truth about this?</text>
<text x="236" y="1121" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> will we approach this safely?</text>
<text x="694" y="1028" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> does this benefit us / others?</text>
<text x="694" y="1059" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> does this harm us / others?</text>
<text x="694" y="1090" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> do we see this in the future?</text>
<text x="694" y="1121" font-size="14.5" fill="#3F3A32"><tspan fill="#D97757" font-weight="bold">…</tspan> can we change this for our good?</text>
<text x="600" y="1174" font-size="14" font-style="italic" fill="#8A8175" text-anchor="middle">Adapted, Anthropic-styled, for Daniel &amp; David — from the classic 5W1H critical-thinking grid.</text>
</svg>
